<header>
  <nav itemscope itemtype="http://schema.org/SiteNavigationElement">
    {{ range site.Menus.main }}
    <a itemprop="url" class="{{ if $.IsMenuCurrent "main" . }}active{{ else if $.HasMenuCurrent "main" . }}active{{ end }}" href="{{ .URL | relLangURL }}"><span itemprop="name">{{ .Name }}</span></a>
    {{ end }}
    <a class="switch-to-v1" href="{{ site.Params.classicURL | default "/" }}" title="Switch back to the classic PaperMod look">&larr; back to v1</a>
  </nav>
</header>
