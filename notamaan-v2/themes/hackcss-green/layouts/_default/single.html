{{ define "main" }}
  <article itemscope itemtype="http://schema.org/CreativeWork">
    <header>
      <h1 itemprop="name">{{ .Title }}</h1>
      {{ if eq .Section "posts" }}
      <p class="muted">{{ partial "post-meta.html" . }}</p>
      {{ end }}
    </header>

    <div itemprop="articleBody">
      {{ .Content }}
    </div>

    <meta itemprop="inLanguage" content="{{ site.LanguageCode | default "en-US" }}">
    {{ if not .Date.IsZero }}<meta itemprop="datePublished" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ end }}
  </article>
{{ end }}
